    <style>

    <script id="wifigate-link-copy" type="application/json">{"statusOpening":"我们正在尝试在应用中打开您的邀请。","statusMissing":"此邀请链接缺少访问信息。请让发送者重新分享。","statusFallback":"如果 WiFiGate 没有自动打开，请使用下方按钮。","copyButton":"复制应用链接","copiedButton":"已复制应用链接"}</script>
    <script>
        const WIFIGATE_LINK_DEFAULT_COPY = {
            statusOpening: "We are trying to open your invitation in the app.",
            statusMissing: "This invitation link is missing the access details. Ask the sender to share it again.",
            statusFallback: "If WiFiGate did not open automatically, use the button below.",
            copyButton: "Copy app link",
            copiedButton: "Copied app link"
        };

        function getUtilityPageCopy() {
            const script = document.getElementById("wifigate-link-copy");
            if (!script) {
                return WIFIGATE_LINK_DEFAULT_COPY;
            }

            try {
                return {
                    ...WIFIGATE_LINK_DEFAULT_COPY,
                    ...JSON.parse(script.textContent || "{}")
                };
            } catch (error) {
                return WIFIGATE_LINK_DEFAULT_COPY;
            }
        }

        function firstNonEmpty() {
            for (const value of arguments) {
                if (typeof value === "string" && value.trim()) {
                    return value.trim();
                }
            }
            return "";
        }

        function buildDeepLink() {
            const currentUrl = new URL(window.location.href);
            const params = currentUrl.searchParams;
            const directLink = firstNonEmpty(params.get("link"));
            if (directLink) {
                return directLink;
            }

            const pathSegments = currentUrl.pathname
                .split("/")
                .filter(Boolean)
                .map((segment) => decodeURIComponent(segment));

            const groupId = firstNonEmpty(
                params.get("gid"),
                params.get("groupId"),
                pathSegments[0] === "group" ? pathSegments[1] : ""
            );

            const dualControlId = firstNonEmpty(
                params.get("dcid"),
                params.get("dualControlId"),
                pathSegments[0] === "dual-control" ? pathSegments[1] : ""
            );

            if (dualControlId) {
                params.delete("link");
                if (!params.has("dcid")) {
                    params.set("dcid", dualControlId);
                }
                if (!params.has("id")) {
                    params.set("id", dualControlId);
                }

                const query = params.toString();
                return `wifigate://dual-control/${encodeURIComponent(dualControlId)}${query ? `?${query}` : ""}`;
            }

            if (groupId) {
                params.delete("link");
                if (!params.has("gid")) {
                    params.set("gid", groupId);
                }
                if (!params.has("id")) {
                    params.set("id", groupId);
                }

                const query = params.toString();
                return `wifigate://group/${encodeURIComponent(groupId)}${query ? `?${query}` : ""}`;
            }

            const gateId = firstNonEmpty(
                params.get("i"),
                params.get("id"),
                params.get("chip")
            );

            const routeId = gateId || (params.get("ep") ? "invite" : "");
            if (!routeId) {
                return "";
            }

            params.delete("link");
            if (!params.has("id")) {
                params.set("id", routeId);
            }

            const query = params.toString();
            return `wifigate://gate/${encodeURIComponent(routeId)}${query ? `?${query}` : ""}`;
        }

        function revealFallback(deepLink, statusText) {
            const copy = getUtilityPageCopy();
            const status = document.getElementById("status");
            const openApp = document.getElementById("open-app");
            const copyLink = document.getElementById("copy-link");

            status.textContent = statusText || copy.statusOpening;
            openApp.hidden = !deepLink;
            copyLink.hidden = !deepLink;
            openApp.href = deepLink || "#";
            copyLink.textContent = copy.copyButton;
            copyLink.onclick = async function () {
                if (!deepLink) {
                    return;
                }

                try {
                    await navigator.clipboard.writeText(deepLink);
                    copyLink.textContent = copy.copiedButton;
                } catch (error) {
                    console.error("Failed to copy deep link", error);
                }
            };

            document.body.classList.add("ready");
        }

        function openImmediately(deepLink) {
            const copy = getUtilityPageCopy();

            if (!deepLink) {
                revealFallback("", copy.statusMissing);
                return;
            }

            window.setTimeout(function () {
                revealFallback(deepLink, copy.statusFallback);
            }, 900);

            window.setTimeout(function () {
                window.location.replace(deepLink);
            }, 40);
        }

        document.addEventListener("DOMContentLoaded", function () {
            openImmediately(buildDeepLink());
        });
    </script>
